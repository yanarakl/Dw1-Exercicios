<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar de Jogo</title>
  <link rel="stylesheet" href="copia-amanda.css">
</head>
<body>

  <h1>Placar de Jogo</h1>

  <div class="container">
    
    <div class="card">
      <h2 id="nameA">Time A</h2>
      <div class="score" id="scoreA">0</div>
      <button id="btnA">+1 Ponto</button>
    </div>

    <div class="card">
      <h2 id="nameB">Time B</h2>
      <div class="score" id="scoreB">0</div>
      <button id="btnB">+1 Ponto</button>
    </div>

  </div>

  <button class="reset" id="reset">Resetar</button>

  <p class="credit">Criado de Prática</p>

  <script src="copia-amanda.js"></script>
</body>
</html>
